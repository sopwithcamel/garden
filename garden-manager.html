<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌿 Garden Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .plant-card { transition: transform 0.18s, box-shadow 0.18s; }
    .plant-card:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.13); }
    .photo-thumb { width:80px; height:80px; object-fit:cover; border-radius:8px; cursor:pointer; }
    .photo-lg { max-height:70vh; max-width:100%; border-radius:12px; }
    input[type=file] { display:none; }
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:100; display:flex; align-items:center; justify-content:center; }
    .badge-good { background:#dcfce7; color:#166534; }
    .badge-fair { background:#fef9c3; color:#854d0e; }
    .badge-poor { background:#fee2e2; color:#991b1b; }
    .priority-urgent { border-left: 4px solid #dc2626; }
    .priority-high    { border-left: 4px solid #f97316; }
    .priority-medium  { border-left: 4px solid #eab308; }
    .priority-low     { border-left: 4px solid #22c55e; }
    .spinner { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    pre { white-space: pre-wrap; word-break: break-all; }
    @media print {
      nav, .no-print { display:none !important; }
      body { background: white; }
    }
  </style>
</head>
<body class="bg-green-50 min-h-screen">

<!-- NAV -->
<nav class="bg-green-800 text-white shadow-lg sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-16">
    <div class="flex items-center gap-3">
      <span class="text-2xl">🌿</span>
      <div>
        <div class="font-semibold text-base leading-tight">Garden Manager</div>
        <div class="text-green-300 text-xs" id="nav-subtitle">Amur Family Home</div>
      </div>
    </div>
    <div class="flex gap-1 text-sm items-center" id="nav-links">
      <a href="#home"  class="px-3 py-2 rounded hover:bg-green-700 transition-colors font-medium">🏡 Garden</a>
      <a href="#tasks" class="px-3 py-2 rounded hover:bg-green-700 transition-colors font-medium">📋 Tasks</a>
      <a href="#add"   class="px-3 py-2 rounded hover:bg-green-700 transition-colors font-medium">➕ Add</a>
      <button onclick="syncNow()" class="px-3 py-2 rounded hover:bg-green-700 transition-colors font-medium" title="Sync from Supabase">🔄</button>
      <button onclick="showSettings()" class="px-3 py-2 rounded hover:bg-green-700 transition-colors font-medium" title="Settings">⚙️</button>
    </div>
  </div>
</nav>

<main id="app" class="max-w-7xl mx-auto px-4 py-6"></main>

<!-- LIGHTBOX -->
<div id="lightbox" class="modal-bg hidden" onclick="closeLightbox()">

// ── Pre-baked credentials ─────────────────────────
// Leave these empty in the "owner" copy.
// Use Settings → Generate Family Copy to produce a
// version with these filled in — share THAT file and
// no one else ever needs to enter anything.
const BAKED_URL        = '';
const BAKED_KEY        = '';
const BAKED_HASH       = '';   // SHA-256 of family password — injected by build.js
const BAKED_CLAUDE_KEY = '';   // Anthropic API key — injected by build.js
// ─────────────────────────────────────────────────

const CONFIG_KEY = 'garden_supabase_config';

function getConfig() {
  // Baked-in credentials take priority (shared family copy)
  if (BAKED_URL && BAKED_KEY) return { url: BAKED_URL, key: BAKED_KEY };
  try { return JSON.parse(localStorage.getItem(CONFIG_KEY)); } catch { return null; }
}
function setConfig(url, key) {
  localStorage.setItem(CONFIG_KEY, JSON.stringify({ url, key }));
}
function clearConfig() {
  localStorage.removeItem(CONFIG_KEY);
}

// ═══════════════════════════════════════════════════
// AUTH — password gate + brute-force protection
// ═══════════════════════════════════════════════════
const AUTH_SESSION_KEY  = 'garden_auth_session';
const AUTH_ATTEMPTS_KEY = 'garden_auth_attempts';
const SESSION_DAYS      = 30;
const MAX_ATTEMPTS      = 5;
const LOCKOUT_MS        = 15 * 60 * 1000;  // 15 minutes

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function isAuthRequired() { return !!BAKED_HASH; }

function checkAuthSession() {
  if (!isAuthRequired()) return true;
  try {
    const s = JSON.parse(localStorage.getItem(AUTH_SESSION_KEY));
    if (!s || !s.ts) return false;
    return (Date.now() - s.ts) / 86400000 < SESSION_DAYS;
  } catch { return false; }
}

function setAuthSession()   { localStorage.setItem(AUTH_SESSION_KEY, JSON.stringify({ ts: Date.now() })); }
function clearAuthSession() { localStorage.removeItem(AUTH_SESSION_KEY); }

function getAttempts() {
  try { return JSON.parse(localStorage.getItem(AUTH_ATTEMPTS_KEY)) || { count:0, lockedUntil:0 }; }
  catch { return { count:0, lockedUntil:0 }; }
}
function saveAttempts(a) { localStorage.setItem(AUTH_ATTEMPTS_KEY, JSON.stringify(a)); }

function recordFailedAttempt() {
  const a = getAttempts();
  a.count = (a.count || 0) + 1;
  if (a.count >= MAX_ATTEMPTS) { a.lockedUntil = Date.now() + LOCKOUT_MS; a.count = 0; }
  saveAttempts(a);
  return a;
}
function clearAttempts() { localStorage.removeItem(AUTH_ATTEMPTS_KEY); }

function renderLogin(msg = '') {
  document.getElementById('nav-links').innerHTML = '';
  const a = getAttempts();
  const locked = a.lockedUntil && Date.now() < a.lockedUntil;
  const left = MAX_ATTEMPTS - (a.count || 0);
  document.getElementById('app').innerHTML = `
    <div class="flex items-center justify-center min-h-[80vh]">
      <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm">
        <div class="text-center mb-6">
          <div class="text-5xl mb-3">🌿</div>
          <div class="text-xl font-bold text-green-800">Amur Family Garden</div>
          <div class="text-sm text-gray-500 mt-1">Enter the family password to continue</div>
        </div>
        ${locked ? `
          <div class="bg-red-50 border border-red-200 rounded-xl p-4 text-center">
            <div class="text-red-700 font-semibold mb-1">🔒 Too many attempts</div>
            <div class="text-red-600 text-sm">Locked for <span id="lockout-cd" class="font-mono font-bold"></span></div>
          </div>
        ` : `
          <form id="login-form" onsubmit="return false">
            <div class="mb-4 relative">
              <input id="pwd-input" type="password"
                class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 text-base focus:border-green-500 focus:outline-none pr-12"
                placeholder="Password" autocomplete="current-password">
              <button type="button" onclick="togglePwd()"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-lg select-none"
                tabindex="-1">👁</button>
            </div>
            ${msg ? `<div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl px-4 py-2 mb-3">${escHtml(msg)}</div>` : ''}
            ${a.count > 0 ? `<div class="text-amber-600 text-xs text-center mb-3">⚠️ ${left} attempt${left!==1?'s':''} remaining before 15-min lockout</div>` : ''}
            <button onclick="doLogin()"
              class="w-full bg-green-700 hover:bg-green-800 text-white font-semibold py-3 rounded-xl transition-colors">
              Unlock Garden 🌱
            </button>
          </form>
        `}
      </div>
    </div>`;
  if (locked) {
    (function tick() {
      const el = document.getElementById('lockout-cd');
      if (!el) return;
      const rem = a.lockedUntil - Date.now();
      if (rem <= 0) { a.lockedUntil = 0; a.count = 0; saveAttempts(a); renderLogin(); return; }
      const m = Math.floor(rem/60000), s = Math.floor((rem%60000)/1000);
      el.textContent = `${m}:${String(s).padStart(2,'0')}`;
      setTimeout(tick, 1000);
    })();
  } else {
    const inp = document.getElementById('pwd-input');
    if (inp) { inp.focus(); inp.addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); }); }
  }
}

function togglePwd() {
  const inp = document.getElementById('pwd-input');
  if (inp) inp.type = inp.type==='password' ? 'text' : 'password';
}

async function doLogin() {
  const inp = document.getElementById('pwd-input');
  if (!inp || !inp.value) { if(inp) inp.focus(); return; }
  const a = getAttempts();
  if (a.lockedUntil && Date.now() < a.lockedUntil) return;
  const hash = await sha256(inp.value);
  if (hash === BAKED_HASH) {
    clearAttempts();
    setAuthSession();
    await startGarden();
  } else {
    inp.value = '';
    const updated = recordFailedAttempt();
    renderLogin(updated.lockedUntil && Date.now() < updated.lockedUntil
      ? '' : 'Incorrect password. Please try again.');
  }
}

function doLogout() {
  clearAuthSession();
  renderLogin();
}

// Generates a pre-configured copy of this HTML file and triggers a download.
// Family members just open that file — no setup needed.
function generateFamilyCopy() {
  const config = getConfig();
  if (!config) { alert('Connect to Supabase first, then generate the family copy.'); return; }
  const { url, key } = config;
  // Grab the live HTML source (includes inline scripts verbatim)
  let html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  // Bake the credentials into the constants
  html = html.replace("const BAKED_URL = '';", `const BAKED_URL = '${url}';`);
  html = html.replace("const BAKED_KEY = '';", `const BAKED_KEY = '${key}';`);
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'garden-manager-family.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

async function loadData() {
  showLoading('Syncing garden data…');
  try {
    const [settingsRes, logsRes, photosRes, customRes] = await Promise.all([
      sb.from('plant_settings').select('*'),
      sb.from('care_events').select('*').order('created_at', { ascending: true }),
      sb.from('photos').select('*').order('created_at', { ascending: true }),
      sb.from('user_plants').select('*').order('created_at', { ascending: true }),
    ]);

    if (settingsRes.error) throw settingsRes.error;

    const settings = settingsRes.data || [];
    const logs = logsRes.data || [];
    const photos = photosRes.data || [];
    const customs = customRes.data || [];

    // Build merged plants array
    plants = SEED.map(p => buildPlant(p, settings, logs, photos));

    // Add user-added custom plants
    customs.forEach(cp => {
      const seedLike = {
        id: cp.id, commonName: cp.common_name, scientificName: cp.scientific_name,
        location: cp.location, emoji: cp.emoji || '🌱', category: cp.category || '',
        edible: cp.edible || false, sunlight: cp.sunlight || '', watering: cp.watering || '',
        waterFreq: '', fertilizer: cp.fertilizer || '', fertFreq: cp.fert_freq || '',
        soil: cp.soil || '', floweringSeason: '', recs: [], tasks: [], seasonNote: '',
      };
      plants.push(buildPlant(seedLike, settings, logs, photos));
    });

    hideLoading();
  } catch (err) {
    hideLoading();
    document.getElementById('app').innerHTML = errBanner(err.message);
    throw err;
  }
}

function buildPlant(seed, settings, logs, photos) {
  const s = settings.find(x => x.plant_id === seed.id) || {};
  const pLogs = logs.filter(l => l.plant_id === seed.id)
    .map(l => ({ date: l.event_date, type: l.event_type, note: l.note || '' }));
  const pPhotos = photos.filter(ph => ph.plant_id === seed.id)
    .map(ph => ({ id: ph.id, url: ph.public_url, storagePath: ph.storage_path, date: ph.photo_date }));
  return {
    ...seed,
    nickname:      s.nickname      || '',
    healthStatus:  s.health_status || 'good',
    age:           s.age           || '',
    datePlanted:   s.date_planted  || '',
    lastWatered:   s.last_watered  || '',
    lastFertilized:s.last_fertilized || '',
    sunlight:      s.sunlight      || seed.sunlight,
    watering:      s.watering      || seed.watering,
    waterFreq:     s.water_freq    || seed.waterFreq,
    fertilizer:    s.fertilizer    || seed.fertilizer,
    fertFreq:      s.fert_freq     || seed.fertFreq,
    soil:          s.soil          || seed.soil,
    recs:          s.recs          || seed.recs,
    tasks:         s.tasks         || seed.tasks,
    seasonNote:    s.season_note   || seed.seasonNote,
    notes:         s.notes         || '',
    careLog:       pLogs,
    photos:        pPhotos,
  };
}

async function upsertSettings(plantId, fields) {
  const row = { plant_id: plantId, updated_at: new Date().toISOString() };
  if ('nickname'       in fields) row.nickname        = fields.nickname;
  if ('healthStatus'   in fields) row.health_status   = fields.healthStatus;
  if ('age'            in fields) row.age              = fields.age;
  if ('datePlanted'    in fields) row.date_planted     = fields.datePlanted || null;
  if ('lastWatered'    in fields) row.last_watered     = fields.lastWatered || null;
  if ('lastFertilized' in fields) row.last_fertilized  = fields.lastFertilized || null;
  if ('sunlight'       in fields) row.sunlight         = fields.sunlight;
  if ('watering'       in fields) row.watering         = fields.watering;
  if ('fertilizer'     in fields) row.fertilizer       = fields.fertilizer;
  if ('fertFreq'       in fields) row.fert_freq        = fields.fertFreq;
  if ('soil'           in fields) row.soil             = fields.soil;
  if ('waterFreq'      in fields) row.water_freq       = fields.waterFreq;
  if ('recs'           in fields) row.recs             = fields.recs || null;
  if ('tasks'          in fields) row.tasks            = fields.tasks || null;
  if ('seasonNote'     in fields) row.season_note      = fields.seasonNote || null;
  if ('notes'          in fields) row.notes            = fields.notes;
  const { error } = await sb.from('plant_settings').upsert(row, { onConflict: 'plant_id' });
  if (error) throw error;
  // Update in-memory
  plants = plants.map(p => p.id === plantId ? { ...p, ...fields } : p);
}

async function insertCareEvent(plantId, type, note) {
  const dateStr = today();
  const { error } = await sb.from('care_events').insert({ plant_id: plantId, event_date: dateStr, event_type: type, note: note || '' });
  if (error) throw error;
  plants = plants.map(p => p.id === plantId ? { ...p, careLog: [...(p.careLog||[]), { date: dateStr, type, note: note||'' }] } : p);
}

async function uploadPhoto(plantId, file) {
  const ext = file.name.split('.').pop();
  const path = `${plantId}/${Date.now()}.${ext}`;
  const { data: upData, error: upErr } = await sb.storage.from('garden-photos').upload(path, file);
  if (upErr) throw upErr;
  const { data: { publicUrl } } = sb.storage.from('garden-photos').getPublicUrl(upData.path);
  const dateStr = today();
  const { data: phData, error: phErr } = await sb.from('photos').insert({ plant_id: plantId, storage_path: upData.path, public_url: publicUrl, photo_date: dateStr }).select().single();
  if (phErr) throw phErr;
  plants = plants.map(p => p.id === plantId ? { ...p, photos: [...(p.photos||[]), { id: phData.id, url: publicUrl, storagePath: upData.path, date: dateStr }] } : p);
}

async function deletePhotoById(plantId, photoId, storagePath) {
  await sb.storage.from('garden-photos').remove([storagePath]);
  await sb.from('photos').delete().eq('id', photoId);
  plants = plants.map(p => p.id === plantId ? { ...p, photos: (p.photos||[]).filter(ph => ph.id !== photoId) } : p);
}

async function insertCustomPlant(data) {
  const { error } = await sb.from('user_plants').insert(data);
  if (error) throw error;
}

const LOCATIONS = ['Front Garden','Living Room Garden','First Floor Balcony','Terrace Balcony','Terrace'];
const LOC_ICONS = { 'Front Garden':'🏡','Living Room Garden':'🛋️','First Floor Balcony':'🌤️','Terrace Balcony':'☀️','Terrace':'🌞' };

function groupByLocation(arr) {
  const map = {};
  LOCATIONS.forEach(l => map[l] = []);
  arr.forEach(p => { if (map[p.location]) map[p.location].push(p); else map[p.location] = [p]; });
  return map;
}
function healthBadge(s) {
  const cfg = { good:'badge-good',fair:'badge-fair',poor:'badge-poor' };
  const lbl = { good:'Healthy',fair:'Needs Attention',poor:'At Risk' };
  return `<span class="text-xs font-semibold px-2 py-0.5 rounded-full ${cfg[s]||'badge-fair'}">${lbl[s]||s}</span>`;
}
function priorityClass(p) { return { urgent:'priority-urgent',high:'priority-high',medium:'priority-medium',low:'priority-low' }[p]||'priority-low'; }
function priorityLabel(p) { return { urgent:'🚨 URGENT',high:'🔴 High',medium:'🟡 Medium',low:'🟢 Low' }[p]||p; }
function fmtDate(d) { if (!d) return '—'; try { return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); } catch { return d; } }
function today() { return new Date().toISOString().split('T')[0]; }
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function getPlant(id) { return plants.find(p => p.id === id); }
function showLoading(msg) { document.getElementById('loading-msg').textContent = msg||'Loading…'; document.getElementById('loading-overlay').classList.remove('hidden'); document.getElementById('loading-overlay').classList.add('flex'); }
function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); document.getElementById('loading-overlay').classList.remove('flex'); }
function errBanner(msg) { return `<div class="bg-red-50 border border-red-200 rounded-2xl p-6 text-red-700"><strong>Error:</strong> ${escHtml(msg)}<br><button onclick="showSettings()" class="mt-3 underline">Check settings</button></div>`; }

function router() {
  const config = getConfig();
  if (!config) { renderSetup(); return; }
  const hash = location.hash || '#home';
  const app = document.getElementById('app');
  if (hash === '#home' || hash === '') app.innerHTML = renderHome();
  else if (hash === '#tasks') app.innerHTML = renderTasks();
  else if (hash === '#add') app.innerHTML = renderAdd();
  else if (hash.startsWith('#plant/')) app.innerHTML = renderPlant(hash.replace('#plant/',''));
  else if (hash.startsWith('#edit/')) app.innerHTML = renderEdit(hash.replace('#edit/',''));
  else app.innerHTML = renderHome();
  window.scrollTo(0,0);
}

window.addEventListener('hashchange', router);

// AI CORRECTIONS
// ═══════════════════════════════════════════════════
const _pendingAiUpdates = {};   // keyed by plant id

async function doAiCorrection(id) {
  const input = (document.getElementById('ai-correction-input') || {}).value?.trim();
  if (!input) return;
  const p = getPlant(id);
  const btn = document.getElementById(`ai-btn-${id}`);
  const status = document.getElementById(`ai-status-${id}`);
  const result = document.getElementById(`ai-result-${id}`);

  btn.disabled = true; btn.textContent = '⏳ Thinking…';
  status.textContent = ''; result.innerHTML = '';

  const summary = {
    commonName: p.commonName, scientificName: p.scientificName, location: p.location,
    sunlight: p.sunlight, watering: p.watering, waterFreq: p.waterFreq,
    fertilizer: p.fertilizer, fertFreq: p.fertFreq, soil: p.soil,
    recs: p.recs, tasks: p.tasks, seasonNote: p.seasonNote
  };

  const prompt = `You are an expert horticulturist. A user has a correction about their plant's care information.

Plant: ${p.commonName} (${p.scientificName})
Current data:
${JSON.stringify(summary, null, 2)}

User correction: "${input}"

Return ONLY a raw JSON object (no markdown, no explanation) containing only the fields that need updating. Allowed fields:
- "recs": string[] — full updated care recommendation list
- "tasks": {t:string, p:"urgent"|"high"|"medium"|"low"}[] — full updated task list
- "seasonNote": string
- "sunlight": string
- "watering": string (e.g. "Every 2–3 days")
- "waterFreq": string (e.g. "every 2-3 days")
- "fertilizer": string
- "fertFreq": string
- "soil": string

Only include fields that should change based on the correction.`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': BAKED_CLAUDE_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 2048,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!resp.ok) {
      const e = await resp.json().catch(() => ({}));
      throw new Error(e?.error?.message || `HTTP ${resp.status}`);
    }
    const data = await resp.json();
    const text = (data.content?.[0]?.text || '').replace(/^```(?:json)?\n?/,'').replace(/\n?```$/,'').trim();
    const updates = JSON.parse(text);
    _pendingAiUpdates[id] = updates;
    showAiResult(id, updates);
  } catch(err) {
    status.textContent = `Error: ${err.message}`;
  } finally {
    btn.disabled = false; btn.textContent = '✨ Suggest Updates';
  }
}

function showAiResult(id, updates) {
  const result = document.getElementById(`ai-result-${id}`);
  const keys = Object.keys(updates || {});
  if (!keys.length) { result.innerHTML = `<p class="text-sm text-gray-400 mt-2">No changes suggested.</p>`; return; }

  const labels = { recs:'Care Recommendations', tasks:'Gardener Tasks', seasonNote:'Seasonal Advice',
    sunlight:'Sunlight', watering:'Watering', waterFreq:'Water Frequency',
    fertilizer:'Fertilizer', fertFreq:'Fertilize Every', soil:'Soil' };

  let rows = keys.map(k => {
    const v = updates[k];
    let display;
    if (k === 'recs' && Array.isArray(v)) {
      display = `<ul class="list-disc ml-4 space-y-1 text-sm text-gray-700">${v.map(r=>`<li>${escHtml(r)}</li>`).join('')}</ul>`;
    } else if (k === 'tasks' && Array.isArray(v)) {
      display = v.map(t=>`<div class="flex gap-2 text-sm"><span class="font-semibold ${t.p==='urgent'||t.p==='high'?'text-red-600':'text-amber-600'} w-14 flex-shrink-0">${t.p}</span><span class="text-gray-700">${escHtml(t.t)}</span></div>`).join('');
    } else {
      display = `<p class="text-sm text-gray-700">${escHtml(String(v))}</p>`;
    }
    return `<div class="px-4 py-3 border-t border-green-100">
      <div class="text-xs text-gray-400 mb-1">${labels[k]||k}</div>${display}</div>`;
  }).join('');

  result.innerHTML = `
    <div class="border border-green-200 rounded-xl overflow-hidden">
      <div class="bg-green-50 px-4 py-2 text-xs font-semibold text-green-700">✨ Suggested Changes (${keys.length} field${keys.length>1?'s':''})</div>
      ${rows}
      <div class="bg-gray-50 px-4 py-3 flex gap-2 border-t border-green-100">
        <button id="ai-apply-btn-${id}" onclick="applyAiCorrection('${id}')"
          class="bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-green-800">
          ✅ Apply Changes
        </button>
        <button onclick="document.getElementById('ai-result-${id}').innerHTML=''"
          class="bg-gray-200 text-gray-600 px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-300">
          Dismiss
        </button>
      </div>
    </div>`;
}

async function applyAiCorrection(id) {
  const updates = _pendingAiUpdates[id];
  if (!updates) return;
  const btn = document.getElementById(`ai-apply-btn-${id}`);
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
  showLoading('Saving corrections…');
  try {
    await upsertSettings(id, updates);
    hideLoading();
    document.getElementById('app').innerHTML = renderPlant(id);
    window.scrollTo(0, 0);
  } catch(err) {
    hideLoading();
    alert(`Error saving: ${err.message}`);
  }
}

function renderTasks() {
  const groups = groupByLocation(plants);
  const genTasks = [
    {p:'urgent',t:'Check water lily container level daily — high evaporation in March heat'},
    {p:'urgent',t:'Harvest broccoli head immediately if not done — bolting risk is critical now'},
    {p:'high',  t:'Increase watering frequency for all plants as temperatures rise to 35°C+'},
    {p:'high',  t:'Check coconut trunk for Red Palm Weevil (sawdust-like frass at base)'},
    {p:'medium',t:'Apply mulch around fruit trees (lemon, pomegranate, banana) to conserve moisture'},
    {p:'medium',t:'Inspect all plants for aphids and spider mites — pest pressure rises in dry heat'},
    {p:'medium',t:'Fertilize fruit trees before peak summer (lemon, pomegranate, longan, banana)'},
    {p:'medium',t:'Divide lemongrass clumps — March/April is the ideal time before monsoon'},
    {p:'medium',t:'Top-dress indoor pot plants (China Doll, Monstera) with fresh compost'},
    {p:'low',   t:'Document any new growth, blooms, or changes with photos in the app'},
    {p:'low',   t:'Collect fallen Palash (Flame of the Forest) flowers for composting'},
    {p:'low',   t:'Prepare garden waste into compost for the upcoming monsoon season'},
  ].sort((a,b)=>({urgent:0,high:1,medium:2,low:3}[a.p])-({urgent:0,high:1,medium:2,low:3}[b.p]));

  const urgentCount = plants.flatMap(p=>p.tasks||[]).filter(t=>t.p==='urgent').length + genTasks.filter(t=>t.p==='urgent').length;
  const highCount   = plants.flatMap(p=>p.tasks||[]).filter(t=>t.p==='high').length   + genTasks.filter(t=>t.p==='high').length;

  const taskRow = (t,key) => `
    <div class="bg-white rounded-xl px-4 py-3 shadow-sm border border-gray-100 flex items-start gap-3 ${priorityClass(t.p)}">
      <input type="checkbox" id="task-${key}" class="mt-0.5 w-4 h-4 accent-green-600 flex-shrink-0" onchange="this.closest('div').classList.toggle('opacity-50',this.checked)">
      <div class="flex-1 min-w-0">
        <div class="text-xs font-bold">${priorityLabel(t.p)}</div>
        <div class="text-sm text-gray-700 mt-0.5">${t.t}</div>
        ${t.plant ? `<div class="text-xs text-green-600 mt-0.5"><a href="#plant/${t.plant.id}" class="hover:underline">${t.plant.emoji} ${escHtml(t.plant.nickname||t.plant.commonName)}</a></div>` : ''}
      </div>
    </div>`;

  let locHtml = '';
  LOCATIONS.forEach(loc => {
    const ps = groups[loc];
    if (!ps || !ps.length) return;
    const locTasks = [];
    ps.forEach(p => (p.tasks||[]).forEach(t => locTasks.push({...t, plant:p})));
    if (!locTasks.length) return;
    locTasks.sort((a,b)=>({urgent:0,high:1,medium:2,low:3}[a.p])-({urgent:0,high:1,medium:2,low:3}[b.p]));
    locHtml += `
    <div class="mb-8">
      <h2 class="text-lg font-bold text-green-800 mb-3">${LOC_ICONS[loc]||'🌿'} ${loc}</h2>
      <div class="space-y-2">${locTasks.map((t,i)=>taskRow(t,`${loc}-${i}`)).join('')}</div>
    </div>`;
  });

  return `
  <div>
    <div class="flex items-center justify-between mb-6 no-print">
      <div>
        <h1 class="text-2xl font-bold text-green-900">📋 Weekly Gardener Tasks</h1>
        <p class="text-green-700 text-sm mt-0.5">Week of ${new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})} · Late Dry / Pre-Monsoon Season</p>
      </div>
      <button onclick="window.print()" class="bg-white border border-gray-200 text-gray-600 px-4 py-2 rounded-xl text-sm font-medium hover:bg-gray-50">🖨️ Print</button>
    </div>

    <div class="bg-orange-50 border border-orange-200 rounded-2xl p-4 mb-6">
      <div class="font-semibold text-orange-800 mb-1">🌡️ Season Alert: Late March — Peak Dry Season</div>
      <div class="text-sm text-orange-700">Temperatures are rising (30–38°C). Key focus: <strong>increase watering</strong>, <strong>mulch all trees</strong>, and <strong>harvest heat-sensitive crops immediately</strong>. Monsoon prep begins next month.</div>
    </div>

    <div class="flex gap-3 mb-6 flex-wrap no-print">
      <span class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-sm font-medium">${urgentCount} Urgent</span>
      <span class="bg-orange-100 text-orange-700 px-3 py-1 rounded-full text-sm font-medium">${highCount} High Priority</span>
      <span class="text-gray-400 text-sm self-center">Check off tasks as your gardener completes them</span>
    </div>

    <div class="mb-8">
      <h2 class="text-lg font-bold text-green-800 mb-3">🗓️ General Garden Tasks This Week</h2>
      <div class="space-y-2">${genTasks.map((t,i)=>taskRow(t,`gen-${i}`)).join('')}</div>
    </div>

    <h2 class="text-lg font-bold text-green-800 mb-4">🌿 Plant-by-Plant Tasks (by location)</h2>
    ${locHtml}
  </div>`;
}

// ═══════════════════════════════════════════════════
// EVENT HANDLERS (async)
// ═══════════════════════════════════════════════════
async function doSaveEdit(id) {
  const form = document.getElementById('edit-form');
  const get = name => { const el = form.querySelector(`[name="${name}"]`); return el ? el.value.trim() : ''; };
  const msg = document.getElementById('edit-msg');
  msg.innerHTML = '<span class="text-gray-500">Saving…</span>';
  try {
    await upsertSettings(id, {
      nickname: get('nickname'), healthStatus: get('healthStatus'),
      age: get('age'), datePlanted: get('datePlanted'),
      lastWatered: get('lastWatered'), lastFertilized: get('lastFertilized'),
      sunlight: get('sunlight'), watering: get('watering'),
      fertilizer: get('fertilizer'), fertFreq: get('fertFreq'),
      soil: get('soil'), notes: get('notes'),
    });
    location.hash = `#plant/${id}`;
  } catch(err) {
    msg.innerHTML = `<span class="text-red-600">Error: ${escHtml(err.message)}</span>`;
  }
}

async function doLogCare(id, type) {
  const note = prompt(`Note for ${type} (optional):`);
  if (note === null) return; // user cancelled
  showLoading(`Logging ${type}…`);
  try {
    const fields = {};
    if (type === 'Watered') fields.lastWatered = today();
    if (type === 'Fertilized') fields.lastFertilized = today();
    if (Object.keys(fields).length) await upsertSettings(id, fields);
    await insertCareEvent(id, type, note);
    hideLoading();
    router();
  } catch(err) {
    hideLoading();
    alert('Error: ' + err.message);
  }
}

async function doAddNote(id) {
  const ta = document.getElementById('new-note');
  if (!ta || !ta.value.trim()) return;
  const p = getPlant(id);
  const newEntry = `[${new Date().toLocaleDateString('en-IN')}] ${ta.value.trim()}`;
  const newNotes = p.notes ? p.notes + '\n' + newEntry : newEntry;
  showLoading('Saving note…');
  try {
    await upsertSettings(id, { notes: newNotes });
    hideLoading();
    router();
  } catch(err) {
    hideLoading();
    alert('Error: ' + err.message);
  }
}

async function doUploadPhoto(input, id) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  const msgEl = document.getElementById(`photo-upload-msg-${id}`);
  if (msgEl) msgEl.textContent = 'Uploading photo…';
  showLoading('Uploading photo…');
  try {
    await uploadPhoto(id, file);
    hideLoading();
    router();
  } catch(err) {
    hideLoading();
    if (msgEl) msgEl.textContent = 'Upload failed: ' + err.message;
    else alert('Upload failed: ' + err.message);
  }
}

async function delPhoto(plantId, photoId, storagePath) {
  if (!confirm('Delete this photo permanently?')) return;
  showLoading('Deleting photo…');
  try {
    await deletePhotoById(plantId, photoId, storagePath);
    hideLoading();
    router();
  } catch(err) {
    hideLoading();
    alert('Error: ' + err.message);
  }
}

async function doAddPlant() {
  const form = document.getElementById('add-form');
  const get = name => { const el = form.querySelector(`[name="${name}"]`); return el ? el.value.trim() : ''; };
  const commonName = get('commonName');
  if (!commonName) { alert('Please enter a plant name.'); return; }
  const msg = document.getElementById('add-msg');
  msg.innerHTML = '<span class="text-gray-500">Adding plant…</span>';
  const newId = 'custom-' + Date.now();
  try {
    await insertCustomPlant({
      id: newId, common_name: commonName,
      scientific_name: get('scientificName'), location: get('location'),
      emoji: get('emoji')||'🌱', category: get('category'),
      sunlight: get('sunlight'), watering: get('watering'),
      fertilizer: get('fertilizer'), fert_freq: get('fertFreq'),
      soil: get('soil'), edible: false,
    });
    if (get('age') || get('datePlanted')) {
      await upsertSettings(newId, { age: get('age'), datePlanted: get('datePlanted') });
    }
    await loadData();
    location.hash = `#plant/${newId}`;
  } catch(err) {
    msg.innerHTML = `<span class="text-red-600">Error: ${escHtml(err.message)}</span>`;
  }
}

async function syncNow() {
  if (!sb) { alert('Not connected to Supabase.'); return; }
  await loadData();
  router();
}

function openLightbox(url) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.remove('hidden');
  document.getElementById('lightbox').classList.add('flex');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.add('hidden');
  document.getElementById('lightbox').classList.remove('flex');
}

function navLinks() {
  return `
    <a href="#home"  class="px-3 py-2 rounded hover:bg-green-700 transition-colors font-medium">🏡 Garden</a>
    <a href="#tasks" class="px-3 py-2 rounded hover:bg-green-700 transition-colors font-medium">📋 Tasks</a>
    <a href="#add"   class="px-3 py-2 rounded hover:bg-green-700 transition-colors font-medium">➕ Add</a>
    <button onclick="syncNow()" class="px-3 py-2 rounded hover:bg-green-700 transition-colors font-medium" title="Sync">🔄</button>
    <button onclick="showSettings()" class="px-3 py-2 rounded hover:bg-green-700 transition-colors font-medium" title="Settings">⚙️</button>
    ${isAuthRequired() ? `<button onclick="doLogout()" class="px-3 py-2 rounded hover:bg-green-700 transition-colors font-medium text-green-300" title="Log out">🔒</button>` : ''}`;
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
async function startGarden() {
  const config = getConfig();
  if (!config) { renderSetup(); return; }
  try {
    initClient(config.url, config.key);
    await loadData();
    document.getElementById('nav-links').innerHTML = navLinks();
    router();
  } catch(err) {
    hideLoading();
    document.getElementById('app').innerHTML = `
      <div class="bg-red-50 border border-red-200 rounded-2xl p-6 max-w-lg mx-auto mt-10">
        <div class="font-bold text-red-800 mb-2">Could not connect to Supabase</div>
        <div class="text-sm text-red-700 mb-4">${escHtml(err.message)}</div>
        <button onclick="showSettings()" class="bg-red-700 text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-red-800">⚙️ Check Settings</button>
      </div>`;
  }
}

async function init() {
  if (isAuthRequired() && !checkAuthSession()) {
    renderLogin();
    return;
  }
  await startGarden();
}

init();
</script>
